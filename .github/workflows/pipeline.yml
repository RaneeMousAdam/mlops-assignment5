name: ML Pipeline

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10
      - name: Install requirements
        run: pip install mlflow
      - name: Run training
        run: python train.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .
      - name: Check accuracy
        run: python check_threshold.py
      - name: Mock Docker build
        run: echo "Building Docker image for accuracy $(cat model_info.txt)"