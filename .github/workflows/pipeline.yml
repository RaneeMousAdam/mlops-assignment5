name: ML Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate Model
    runs-on: ubuntu-latest
    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mlflow dvc

      # Pull data from DVC
      - name: Pull Data
        run: dvc pull

      # Run training
      - name: Train Model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_URI }}
        run: python train.py
          
      # Upload artifact
      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    needs: validate
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # Download artifact
      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .

      # Install dependencies
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install MLflow
        run: pip install mlflow

      # Check threshold
      - name: Check Accuracy Threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_URI }}
        run: |
          python check_threshold.py model_info.txt 0.85

      # Mock Docker build
      - name: Build Docker Image
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"