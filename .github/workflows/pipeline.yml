name: ML Pipeline

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # Checkout code
      - uses: actions/checkout@v4

      # Setup Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install dependencies
      - name: Install dependencies
        run: pip install mlflow scikit-learn

      # (Optional) DVC pull - ignored if fails
      - name: Pull data
        run: dvc pull
        continue-on-error: true

      # Train model
      - name: Train Model
        run: python train.py

      # Upload model_info.txt
      - name: Upload model info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      # Checkout code
      - uses: actions/checkout@v4

      # Setup Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install MLflow
      - name: Install MLflow
        run: pip install mlflow

      # Download artifact
      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model-info

      # Check accuracy threshold
      - name: Check Accuracy
        run: python check_threshold.py model_info.txt 0.85

      # Mock Docker build
      - name: Build Docker Image
        run: echo "Building Docker image for Run ID $(cat model_info.txt)"